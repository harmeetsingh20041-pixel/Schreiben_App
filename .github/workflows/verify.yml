name: Verify

on:
  pull_request:
  push:
    branches: [main, "phase-*"]
  workflow_dispatch:
    inputs:
      run_e2e:
        description: Run the Chromium smoke suite
        required: false
        default: false
        type: boolean
      run_authenticated_e2e:
        description: Run the protected provider-free authenticated staging matrix
        required: false
        default: false
        type: boolean
      run_database_tests:
        description: Start local Supabase and run pgTAP tests
        required: false
        default: false
        type: boolean
      run_launch_quality_gate:
        description: Verify the qualified evaluator corpus and worksheet bank
        required: false
        default: false
        type: boolean
      run_operational_release_gate:
        description: Verify performance and seven-day pilot exit evidence
        required: false
        default: false
        type: boolean
      run_production_preflight:
        description: Collect and verify the read-only production launch preflight
        required: false
        default: false
        type: boolean
      run_production_clean_baseline:
        description: Run the clean production zero-data baseline gate
        required: false
        default: false
        type: boolean
      run_production_artifact:
        description: Build, hash, attest, and retain the production rollback artifact
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  application:
    name: Typecheck, unit tests, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.9.2

      - name: Reconcile the V1 audit ledger and severity register
        run: pnpm run audit:verify

      - name: Typecheck
        run: pnpm run typecheck

      - name: Run unit tests
        run: pnpm run test:unit

      - name: Typecheck Edge Functions and regressions
        run: pnpm run check:edge

      - name: Run Edge Function regressions
        run: pnpm run test:edge

      - name: Build with explicit CI configuration
        run: pnpm run build:ci

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high

  e2e:
    name: Browser smoke test
    if: github.event_name != 'workflow_dispatch' || inputs.run_e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm run test:e2e:install

      - name: Run browser smoke tests
        run: pnpm run test:e2e

      - name: Run practice-state and responsive-navigation matrix
        run: pnpm run test:e2e:practice-state-matrix

      - name: Upload browser artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-failure-artifacts
          path: |
            playwright-report
            test-results/playwright
          if-no-files-found: ignore
          retention-days: 7

  authenticated-e2e:
    name: Authenticated staging workflow smoke
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && github.ref_protected == true && inputs.run_authenticated_e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm run test:e2e:install

      - name: Run authenticated staging smokes
        shell: bash
        env:
          E2E_AUTHENTICATED: "true"
          VITE_SUPABASE_URL: https://vzcgalzspdehmnvqczfw.supabase.co
          VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_VITE_SUPABASE_ANON_KEY }}
          E2E_TEACHER_EMAIL: ${{ secrets.E2E_TEACHER_EMAIL }}
          E2E_TEACHER_PASSWORD: ${{ secrets.E2E_TEACHER_PASSWORD }}
          E2E_STUDENT_EMAIL: ${{ secrets.E2E_STUDENT_EMAIL }}
          E2E_STUDENT_PASSWORD: ${{ secrets.E2E_STUDENT_PASSWORD }}
        run: |
          set -euo pipefail
          required=(
            VITE_SUPABASE_ANON_KEY
            E2E_TEACHER_EMAIL
            E2E_TEACHER_PASSWORD
            E2E_STUDENT_EMAIL
            E2E_STUDENT_PASSWORD
          )
          missing=()
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Authenticated staging matrix prerequisites are incomplete. Configure the protected staging environment before retrying."
            exit 1
          fi
          pnpm run test:e2e:authenticated
          E2E_DIALOG_SWEEP=true pnpm run test:e2e:dialog-viewport

  production-artifact:
    name: Attested production rollback artifact
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && github.ref_protected == true && inputs.run_production_artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Bind rollback release to the checked-out commit
        shell: bash
        env:
          APPROVED_APP_RELEASE: ${{ vars.PRODUCTION_VITE_APP_RELEASE }}
        run: |
          set -euo pipefail
          if [[ "$APPROVED_APP_RELEASE" != "$GITHUB_SHA" ]]; then
            echo "Configured production release does not match the checked-out commit." >&2
            exit 1
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload hidden source maps
        env:
          PORT: ${{ vars.PRODUCTION_PORT }}
          BASE_PATH: ${{ vars.PRODUCTION_BASE_PATH }}
          VITE_SUPABASE_URL: ${{ vars.PRODUCTION_VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.PRODUCTION_VITE_SUPABASE_ANON_KEY }}
          VITE_ENABLE_DEMO_MODE: ${{ vars.PRODUCTION_VITE_ENABLE_DEMO_MODE }}
          VITE_ENABLE_PUBLIC_TEACHER_SIGNUP: ${{ vars.PRODUCTION_VITE_ENABLE_PUBLIC_TEACHER_SIGNUP }}
          VITE_ENABLE_PUBLIC_STUDENT_SIGNUP: ${{ vars.PRODUCTION_VITE_ENABLE_PUBLIC_STUDENT_SIGNUP }}
          VITE_SENTRY_DSN: ${{ vars.PRODUCTION_VITE_SENTRY_DSN }}
          VITE_SENTRY_ENVIRONMENT: ${{ vars.PRODUCTION_VITE_SENTRY_ENVIRONMENT }}
          VITE_APP_RELEASE: ${{ github.sha }}
          VITE_SENTRY_ENABLE_REPLAY: ${{ vars.PRODUCTION_VITE_SENTRY_ENABLE_REPLAY }}
          SENTRY_UPLOAD_SOURCE_MAPS: "true"
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_API_BASE_URL: ${{ vars.SENTRY_API_BASE_URL }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
        run: pnpm --filter @workspace/german-writing-coach run build

      - name: Create exact production Edge rollback bundle
        run: >-
          pnpm release:artifact:edge --
          --source "$GITHUB_WORKSPACE/supabase/functions"
          --output "$RUNNER_TEMP/production-edge-functions"

      - name: Create immutable artifact hash manifest
        env:
          VITE_APP_RELEASE: ${{ github.sha }}
        run: >-
          pnpm release:artifact:manifest --
          --release "$VITE_APP_RELEASE"
          --frontend "$GITHUB_WORKSPACE/artifacts/german-writing-coach/dist/public"
          --edge "$RUNNER_TEMP/production-edge-functions"
          --migrations "$GITHUB_WORKSPACE/supabase/migrations"
          --output "$RUNNER_TEMP/release-artifact-manifest.json"

      - name: Attest the hash manifest
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: ${{ runner.temp }}/release-artifact-manifest.json

      - name: Retain rollback artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: schreiben-production-${{ github.sha }}
          path: |
            artifacts/german-writing-coach/dist/public
            ${{ runner.temp }}/production-edge-functions
            supabase/migrations
            ${{ runner.temp }}/release-artifact-manifest.json
          if-no-files-found: error
          retention-days: 90

  database:
    name: Local database tests
    if: github.event_name != 'workflow_dispatch' || inputs.run_database_tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1.7.1
        with:
          version: 2.109.1

      - name: Start local Supabase and replay migrations
        run: supabase start

      - name: Reset from the complete migration history
        run: supabase db reset --local

      - name: Run pgTAP tests
        run: supabase test db

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup

  launch-quality:
    name: Qualified educational quality gate
    if: github.event_name == 'workflow_dispatch' && inputs.run_launch_quality_gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    env:
      VITE_APP_RELEASE: ${{ vars.PRODUCTION_VITE_APP_RELEASE }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify signed-off evaluator and worksheet evidence
        run: >-
          pnpm quality:verify --
          --release "$VITE_APP_RELEASE"
          --evaluator quality/evaluator-corpus/reviewed-cases.jsonl
          --worksheets quality/worksheet-bank/approved-revisions.jsonl
          --answers quality/worksheet-bank/answer-gold-set.jsonl

  operational-release:
    name: Operational performance and pilot exit gate
    if: github.event_name == 'workflow_dispatch' && inputs.run_operational_release_gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    env:
      VITE_APP_RELEASE: ${{ vars.PRODUCTION_VITE_APP_RELEASE }}
      PRODUCTION_PROJECT_REF: ${{ vars.PRODUCTION_PROJECT_REF }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify performance and pilot exit evidence
        run: >-
          pnpm release:verify --
          --release "$VITE_APP_RELEASE"
          --project-ref "$PRODUCTION_PROJECT_REF"
          --performance quality/operations/performance-samples.jsonl
          --pilot quality/operations/pilot-days.json

  production-preflight:
    name: Read-only production environment preflight
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && github.ref_protected && inputs.run_production_preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Supabase CLI
        uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1.7.1
        with:
          version: 2.109.1

      - name: Reset a disposable local migration-history database
        run: |
          supabase start
          supabase db reset --local --no-seed

      - name: Bind preflight psql to the disposable local database
        shell: bash
        run: |
          set -euo pipefail
          psql --version
          local_db_url="$(supabase status -o env | sed -n 's/^DB_URL=//p' | head -n 1)"
          local_db_url="${local_db_url%\"}"
          local_db_url="${local_db_url#\"}"
          if [[ "$local_db_url" != postgresql://* && "$local_db_url" != postgres://* ]]; then
            echo "Disposable local database URL is unavailable." >&2
            exit 1
          fi
          echo "::add-mask::$local_db_url"
          umask 077
          printf '%s' "$local_db_url" > "$RUNNER_TEMP/production-preflight-local-db-url"

      - name: Create an ephemeral local link to the declared production project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.PRODUCTION_SUPABASE_DB_PASSWORD }}
          PRODUCTION_PROJECT_REF: ${{ vars.PRODUCTION_PROJECT_REF }}
        run: >-
          supabase link
          --project-ref "$PRODUCTION_PROJECT_REF"

      - name: Collect and verify production evidence without mutation
        shell: bash
        env:
          PORT: ${{ vars.PRODUCTION_PORT }}
          BASE_PATH: ${{ vars.PRODUCTION_BASE_PATH }}
          VITE_SUPABASE_URL: ${{ vars.PRODUCTION_VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.PRODUCTION_VITE_SUPABASE_ANON_KEY }}
          VITE_ENABLE_DEMO_MODE: ${{ vars.PRODUCTION_VITE_ENABLE_DEMO_MODE }}
          VITE_ENABLE_PUBLIC_TEACHER_SIGNUP: ${{ vars.PRODUCTION_VITE_ENABLE_PUBLIC_TEACHER_SIGNUP }}
          VITE_ENABLE_PUBLIC_STUDENT_SIGNUP: ${{ vars.PRODUCTION_VITE_ENABLE_PUBLIC_STUDENT_SIGNUP }}
          VITE_SENTRY_DSN: ${{ vars.PRODUCTION_VITE_SENTRY_DSN }}
          VITE_SENTRY_ENVIRONMENT: ${{ vars.PRODUCTION_VITE_SENTRY_ENVIRONMENT }}
          VITE_APP_RELEASE: ${{ vars.PRODUCTION_VITE_APP_RELEASE }}
          VITE_SENTRY_ENABLE_REPLAY: ${{ vars.PRODUCTION_VITE_SENTRY_ENABLE_REPLAY }}
          SENTRY_UPLOAD_SOURCE_MAPS: ${{ vars.PRODUCTION_SENTRY_UPLOAD_SOURCE_MAPS }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PRODUCTION_SUPABASE_SERVICE_ROLE_KEY }}
          PRODUCTION_PROJECT_REF: ${{ vars.PRODUCTION_PROJECT_REF }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_API_BASE_URL: ${{ vars.SENTRY_API_BASE_URL }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          PRODUCTION_PREFLIGHT_EXPECTATIONS_JSON: ${{ vars.PRODUCTION_PREFLIGHT_EXPECTATIONS_JSON }}
          PRODUCTION_OPERATIONS_EVIDENCE_JSON: ${{ vars.PRODUCTION_OPERATIONS_EVIDENCE_JSON }}
        run: |
          set -euo pipefail
          LOCAL_SUPABASE_DB_URL="$(<"$RUNNER_TEMP/production-preflight-local-db-url")"
          export LOCAL_SUPABASE_DB_URL
          pnpm production:preflight -- \
            --evidence-output "$RUNNER_TEMP/production-preflight-evidence.json" \
            --report-output "$RUNNER_TEMP/production-preflight-report.json"

      - name: Stop the disposable local migration-history database
        if: always()
        run: |
          stop_status=0
          supabase stop --no-backup || stop_status=$?
          rm -f "$RUNNER_TEMP/production-preflight-local-db-url"
          rm -rf "$GITHUB_WORKSPACE/supabase/.temp"
          exit "$stop_status"

      - name: Collect the content-free production worksheet inventory
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          VITE_APP_RELEASE: ${{ vars.PRODUCTION_VITE_APP_RELEASE }}
          PRODUCTION_PROJECT_REF: ${{ vars.PRODUCTION_PROJECT_REF }}
        run: >-
          pnpm worksheet-inventory:collect --
          --release "$VITE_APP_RELEASE"
          --project-ref "$PRODUCTION_PROJECT_REF"
          --output "$RUNNER_TEMP/production-worksheet-inventory.json"

      - name: Reconcile production worksheets to the qualified launch bank
        env:
          VITE_APP_RELEASE: ${{ vars.PRODUCTION_VITE_APP_RELEASE }}
          PRODUCTION_PROJECT_REF: ${{ vars.PRODUCTION_PROJECT_REF }}
        run: >-
          pnpm worksheet-inventory:verify --
          --release "$VITE_APP_RELEASE"
          --project-ref "$PRODUCTION_PROJECT_REF"
          --approvals quality/worksheet-bank/approved-revisions.jsonl
          --inventory "$RUNNER_TEMP/production-worksheet-inventory.json"
          --report-output "$RUNNER_TEMP/production-worksheet-inventory-report.json"

      - name: Upload sanitized preflight evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: production-preflight-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/production-preflight-evidence.json
            ${{ runner.temp }}/production-preflight-report.json
            ${{ runner.temp }}/production-worksheet-inventory.json
            ${{ runner.temp }}/production-worksheet-inventory-report.json
          if-no-files-found: ignore
          retention-days: 30

  production-migration-parity:
    name: Empty-project migration statement parity
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && github.ref_protected == true && inputs.run_production_clean_baseline
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Supabase CLI
        uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1.7.1
        with:
          version: 2.109.1

      - name: Reset a disposable local migration-history database
        run: |
          supabase start
          supabase db reset --local --no-seed

      - name: Store the loopback database URL owner-only
        shell: bash
        run: |
          set -euo pipefail
          psql --version
          local_db_url="$(supabase status -o env | sed -n 's/^DB_URL=//p' | head -n 1)"
          local_db_url="${local_db_url%\"}"
          local_db_url="${local_db_url#\"}"
          if [[ "$local_db_url" != postgresql://* && "$local_db_url" != postgres://* ]]; then
            echo "Disposable local database URL is unavailable." >&2
            exit 1
          fi
          echo "::add-mask::$local_db_url"
          umask 077
          printf '%s\n' "$local_db_url" > "$RUNNER_TEMP/local-supabase-db-url"

      - name: Verify content-free migration statement parity
        shell: bash
        env:
          VITE_APP_RELEASE: ${{ vars.PRODUCTION_VITE_APP_RELEASE }}
          PRODUCTION_PROJECT_REF: ${{ vars.PRODUCTION_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          pnpm production:migration-parity -- \
            --project-ref "$PRODUCTION_PROJECT_REF" \
            --release "$VITE_APP_RELEASE" \
            --source-revision "$GITHUB_SHA" \
            --local-db-url-file "$RUNNER_TEMP/local-supabase-db-url" \
            --evidence-output "$RUNNER_TEMP/production-migration-parity.json" \
            --report-output "$RUNNER_TEMP/production-migration-parity-report.json"

      - name: Stop the disposable local database and remove local state
        if: always()
        shell: bash
        run: |
          supabase stop --no-backup || true
          rm -f "$RUNNER_TEMP/local-supabase-db-url"
          rm -rf supabase/.temp

      - name: Upload content-free migration parity evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: production-migration-parity-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/production-migration-parity.json
            ${{ runner.temp }}/production-migration-parity-report.json
          if-no-files-found: ignore
          retention-days: 30

  production-clean-baseline:
    name: Clean production zero-data baseline
    needs: production-migration-parity
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && github.ref_protected == true && inputs.run_production_clean_baseline && needs.production-migration-parity.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Collect and immediately verify the read-only zero-data evidence
        shell: bash
        env:
          VITE_APP_RELEASE: ${{ vars.PRODUCTION_VITE_APP_RELEASE }}
          PRODUCTION_PROJECT_REF: ${{ vars.PRODUCTION_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          pnpm production:clean-baseline:collect -- \
            --project-ref "$PRODUCTION_PROJECT_REF" \
            --release "$VITE_APP_RELEASE" \
            --source-revision "$GITHUB_SHA" \
            --output "$RUNNER_TEMP/production-clean-baseline.json"
          pnpm production:clean-baseline:verify -- \
            --project-ref "$PRODUCTION_PROJECT_REF" \
            --release "$VITE_APP_RELEASE" \
            --source-revision "$GITHUB_SHA" \
            --evidence "$RUNNER_TEMP/production-clean-baseline.json" \
            --report-output "$RUNNER_TEMP/production-clean-baseline-report.json"

      - name: Upload content-free baseline evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: production-clean-baseline-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/production-clean-baseline.json
            ${{ runner.temp }}/production-clean-baseline-report.json
          if-no-files-found: ignore
          retention-days: 30
